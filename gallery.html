<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>糖糖花园 · 花朵图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f3f8ee;
    --bg2: #e9f1df;
    --ink: #23331f;
    --ink-soft: #5c6d54;
    --card: #ffffff;
    --accent: #6ab04c;
    --danger: #c2453c;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: linear-gradient(180deg, #f3f8ee 0%, #e0e9d0 100%);
    color: var(--ink); min-height: 100vh;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font: 700 36px/1.1 'ZCOOL KuaiLe'; margin: 8px 0 4px; }
  .sub { color: var(--ink-soft); font: 500 14px 'Noto Sans SC'; margin: 0 0 24px; }
  h2 { font: 700 22px 'ZCOOL KuaiLe'; margin: 28px 0 10px; }
  .note { font: 500 12px 'Noto Sans SC'; color: var(--ink-soft); margin: 4px 0 14px; }
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .card { cursor: pointer; transition: transform 0.15s; }
  .card:hover { transform: translateY(-3px); }
  .card-inner { padding: 14px 10px 16px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; background: #fff; border-radius: 16px; }
  .card-name { font: 700 15px 'ZCOOL KuaiLe'; margin-top: 4px; }
  .card-desc { font: 500 11px/1.45 'Noto Sans SC'; color: var(--ink-soft); margin-top: 6px; max-width: 150px; }
  .back { display: inline-block; font: 500 13px 'Noto Sans SC'; color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--ink-soft); padding-bottom: 1px; margin-bottom: 12px; }
  footer { text-align: center; color: var(--ink-soft); font-size: 13px; margin: 40px 0 12px; }
  footer a { color: var(--accent); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(35,51,31,0.65);
    display: grid; place-items: center; padding: 20px; z-index: 100;
  }
  .modal {
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    background: #fff; border-radius: 20px; padding: 20px;
    border: 3px solid var(--ink); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .modal h3 { font: 700 22px 'ZCOOL KuaiLe'; margin: 4px 0; }
  .close-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--ink); background: #fff; cursor: pointer;
    font-size: 14px;
  }
  .q-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
  .q-cell {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 6px; background: #fbf9f0; border-radius: 12px;
    border: 1.5px solid #e6eadd;
  }
  .q-cell-name { font: 600 11px 'Noto Sans SC'; color: var(--ink); margin-top: 4px; }
  .q-cell-desc { font: 500 9px 'Noto Sans SC'; color: var(--ink-soft); }

  @keyframes sg-rainbow { 0%{background-position:0% 0} 100%{background-position:200% 0} }
  @keyframes sg-rainbow-rotate { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
  @keyframes sg-sheen { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  @keyframes sg-sparkle-float {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
  }
  @keyframes sg-glow-breath {
    0%,100% { opacity: 0.35; transform: scale(0.95); }
    50% { opacity: 0.7; transform: scale(1.1); }
  }
  @keyframes sg-tear {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    25% { opacity: 0.9; }
    100% { opacity: 0; transform: translateY(30px) scale(1); }
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="./">← 回主页</a>
  <h1>花朵图鉴</h1>
  <p class="sub">糖糖花园里一共能开出 <b id="speciesCount">-</b> 种花，分 5 个稀有度档次。点任一朵看它所有品质状态。</p>
  <div id="root"></div>
  <footer>
    <a href="./">进入花园</a> · <a href="https://github.com/QianyangPeng/sugar-garden">源码</a>
  </footer>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Reuse the exact flower + rarity code from the app -->
<script type="text/babel" src="./src/data.jsx"></script>
<script type="text/babel" src="./src/flowers.jsx"></script>
<script type="text/babel" src="./src/screens.jsx"></script>

<script type="text/babel">
const { useState: uS } = React;

const TIER_LABEL = { R: '普通', SR: '稀有', SSR: '超稀', SSSR: '极稀', UR: '传说' };
const TIER_TRIGGER = {
  R:    '每日默认最高概率',
  SR:   '每次抽卡 ~30% 概率',
  SSR:  '每次抽卡 ~15% 概率',
  SSSR: '每次抽卡 ~4% 概率，需要抽卡次数多才容易见到',
  UR:   '每次抽卡 ~1% 概率，极其罕见',
};

const QUALITY_LIST = [
  { q: 'perfect', label: '完美',   desc: '<40% 上限' },
  { q: 'great',   label: '很好',   desc: '40-70%' },
  { q: 'ok',      label: '还行',   desc: '70-90%' },
  { q: 'okish',   label: '勉强',   desc: '90-100%' },
  { q: 'wilted',  label: '蔫了',   desc: '100-130%' },
  { q: 'dead',    label: '枯萎',   desc: '≥130%' },
];

function FlowerCard({ speciesId, onClick }) {
  const f = FLOWERS[speciesId];
  return (
    <div className="card" onClick={() => onClick(speciesId)}>
      <RarityFrame rarity={f.rarity} padding={5} radius={16} animate={true}>
        <div className="card-inner">
          <div style={{ position: 'relative' }}>
            <FlowerSVG size={90} species={speciesId} quality="perfect" animate headOnly={false} />
            <QualityFx quality="perfect" rarity={f.rarity} />
          </div>
          <div style={{ marginTop: 6 }}><RarityBadge rarity={f.rarity} size="sm" /></div>
          <div className="card-name">{f.name}</div>
          <div className="card-desc">{f.desc}</div>
        </div>
      </RarityFrame>
    </div>
  );
}

function DetailModal({ speciesId, onClose }) {
  const f = FLOWERS[speciesId];
  if (!f) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ position: 'relative' }}>
        <button className="close-btn" onClick={onClose}>✕</button>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <RarityFrame rarity={f.rarity} padding={5} radius={18}>
            <div style={{ padding: 16, display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative' }}>
              <FlowerSVG size={130} species={speciesId} quality="perfect" animate />
              <QualityFx quality="perfect" rarity={f.rarity} />
            </div>
          </RarityFrame>
          <div style={{ marginTop: 10 }}><RarityBadge rarity={f.rarity} size="md" /></div>
          <h3 style={{ marginTop: 8 }}>{f.name}</h3>
          <div style={{ font: "500 12px 'Noto Sans SC'", color: '#5c6d54', textAlign: 'center', marginTop: 4 }}>
            {f.desc}
          </div>
          <div style={{ marginTop: 6, font: "500 11px 'Noto Sans SC'", color: '#8a9a85' }}>
            {TIER_LABEL[f.rarity]} · {TIER_TRIGGER[f.rarity]}
          </div>
        </div>

        <h4 style={{ font: "700 13px 'ZCOOL KuaiLe'", marginTop: 18, marginBottom: 0 }}>6 种品质状态</h4>
        <p style={{ font: "500 11px 'Noto Sans SC'", color: '#5c6d54', margin: '4px 0 0' }}>
          花的品质由当日「糖量/时间」比例决定。wilted 和 dead 是所有花通用的失败态。
        </p>
        <div className="q-grid">
          {QUALITY_LIST.map(({ q, label, desc }) => (
            <div key={q} className="q-cell">
              <div style={{ position: 'relative', width: 60, height: 80 }}>
                <FlowerSVG size={60} species={speciesId} quality={q} animate={false} />
                <QualityFx quality={q} rarity={f.rarity} />
              </div>
              <div className="q-cell-name">{label}</div>
              <div className="q-cell-desc">{desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [selected, setSelected] = uS(null);
  const byRarity = {};
  for (const id of Object.keys(FLOWERS)) {
    const rarity = FLOWERS[id].rarity;
    (byRarity[rarity] = byRarity[rarity] || []).push(id);
  }
  document.getElementById('speciesCount').textContent = Object.keys(FLOWERS).length;

  return (
    <div>
      {RARITY_ORDER.map(tier => {
        const list = byRarity[tier] || [];
        if (!list.length) return null;
        return (
          <section key={tier}>
            <h2>{tier === 'UR' ? '🌈' : tier === 'SSSR' ? '💫' : tier === 'SSR' ? '✨' : tier === 'SR' ? '🌟' : '🌸'}
              {' '}{tier} · {TIER_LABEL[tier]}（{list.length} 种）</h2>
            <p className="note">{TIER_TRIGGER[tier]}</p>
            <div className="grid">
              {list.map(id => (
                <FlowerCard key={id} speciesId={id} onClick={setSelected} />
              ))}
            </div>
          </section>
        );
      })}

      {selected && <DetailModal speciesId={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
